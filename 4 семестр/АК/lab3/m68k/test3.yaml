# /app/variants/rle_decompress_bytes/1.yaml
name: "assert rle_decompress_bytes(2, 33488896) == [1, 4278190080]"
limit: 2000
memory_size: 0x1000
memory_mapped_io:
  0x80: [2, 33488896]
  0x84: []
reports:
  - name: Check results
    slice: last
    filter:
      - state
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:hex}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [0x00000001,0xff000000]
