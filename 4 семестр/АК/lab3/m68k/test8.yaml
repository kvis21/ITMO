# /app/variants/rle_decompress_bytes/8.yaml
name: "assert rle_decompress_bytes(2, 11141120) == [-1]"
limit: 2000
memory_size: 0x1000
memory_mapped_io:
  0x80: [2, 11141120]
  0x84: []
reports:
  - name: step-by-step
    slice: all
    view: |
      {pc:hex}:	 {A0:hex} {instruction}	{pc:label}
      D0: {D0:hex}, D1: {D1:hex}, D2: {D2:hex}, D3: {D3:hex}, D4: {D4:hex}, D5: {D5:hex}, D6: {D6:hex}, D7: {D7:hex}
      A0: {A0:hex}, A1: {A1:hex}, A2: {A2:hex}, A3: {A3:hex}, A4: {A4:hex}, A5: {A5:hex}, A6: {A6:hex}, A7: {A7:hex}
      {memory:0x400:0x420}
      ==============================================================================================================
  - name: Check results
    slice: last
    filter:
      - state
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
    assert: |
      numio[0x80]: [] >>> []
      numio[0x84]: [] >>> [-1]